<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Lender | Loan Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="form-page">

    <div class="form-card">

        <div class="form-header">

            <h1>🏦 Smart Lender</h1>

            <p>

                Fill in the applicant details to predict
                loan approval using Machine Learning.

            </p>

        </div>

        <form action="/predict" method="POST">

            <div class="section-title">

                👤 Personal Information

            </div>

            <div class="form-grid">

                <div class="input-group">

                    <label>Gender</label>

                    <select name="gender" required>

                        <option value="">Select Gender</option>

                        <option value="Male">Male</option>

                        <option value="Female">Female</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Married</label>

                    <select name="married" required>

                        <option value="">Select</option>

                        <option value="Yes">Yes</option>

                        <option value="No">No</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Dependents</label>

                    <select name="dependents" required>

                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3+">3+</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Education</label>

                    <select name="education" required>

                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Self Employed</label>

                    <select name="self_employed" required>

                        <option value="Yes">Yes</option>
                        <option value="No">No</option>

                    </select>

                </div>

            </div>

            <div class="section-title">

                💰 Financial Details

            </div>

            <div class="form-grid">

                <div class="input-group">

                    <label>Applicant Income</label>

                    <input type="number"
                           name="applicant_income"
                           placeholder="Enter Applicant Income"
                           required>

                </div>

                <div class="input-group">

                    <label>Co-Applicant Income</label>

                    <input type="number"
                           name="coapplicant_income"
                           placeholder="Enter Co-Applicant Income"
                           required>

                </div>

                <div class="input-group">

                    <label>Loan Amount</label>

                    <input type="number"
                           name="loan_amount"
                           placeholder="Enter Loan Amount"
                           required>

                </div>

                <div class="input-group">

                    <label>Loan Term (Months)</label>

                    <input type="number"
                           name="loan_amount_term"
                           placeholder="Example : 360"
                           required>

                </div>

                <div class="input-group">

                    <label>Credit History</label>

                    <select name="credit_history" required>

                        <option value="1">

                            Good

                        </option>

                        <option value="0">

                            Bad

                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Property Area</label>

                    <select name="property_area" required>

                        <option value="Urban">Urban</option>

                        <option value="Semiurban">

                            Semi Urban

                        </option>

                        <option value="Rural">

                            Rural

                        </option>

                    </select>

                </div>

            </div>

            <button class="btn submit-btn">

                Predict Loan Approval

            </button>

        </form>

    </div>

</div>

</body>

</html>
